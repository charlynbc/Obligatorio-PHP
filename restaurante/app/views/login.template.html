<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mangiare a presto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/mangiare.css">
</head>
<body class="brand-page auth-page">

    <nav class="navbar navbar-dark mangiare-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand brand-mark" href="/">
                <span class="brand-title">Mangiare a presto</span>
                <span class="brand-subtitle">cucina italiana · pedidos al momento</span>
            </a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center auth-shell py-5">
        <div class="card page-card shadow-sm" style="width: 100%; max-width: 460px;">
            <div class="card-body p-4">
                <p class="eyebrow mb-2">Benvenuto</p>
                <h4 class="card-title page-card-title mb-2 fw-bold">
                    <i class="bi bi-person-circle me-2 text-primary"></i>Iniciar Sesión
                </h4>
                <p class="page-intro small mb-4">Entrá para ver tu perfil, seguir tus pedidos y guardar tus platos favoritos.</p>

                {{REGISTERED}}
                {{ERROR}}

                <form method="POST" action="/?controller=Usuario&action=login" novalidate>
                    {{CSRF_FIELD}}

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="tu@email.com" required autocomplete="email">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Tu contraseña" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center mb-0 text-muted small">
                    ¿No tenés cuenta?
                    <a href="/?controller=Usuario&action=registro">Registrarse</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
