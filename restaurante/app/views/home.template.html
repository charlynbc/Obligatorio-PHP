<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Menú - Restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f5f0; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .card-img-top { height: 200px; object-fit: cover; }
        .hero { background: linear-gradient(135deg, #b5451b 0%, #e07b39 100%); color: #fff; padding: 60px 0 40px; text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 2.6rem; font-weight: 700; }
        .precio-badge { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-shop"></i> Restaurante</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-2">
                    {{USER_NAV}}
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1><i class="bi bi-cup-hot-fill"></i> Bienvenido a Nuestro Restaurante</h1>
            <p class="lead mb-0">Conocé nuestras delicias del día</p>
        </div>
    </section>

    <main class="container pb-5">
        <h2 class="mb-4 fw-bold">Menú Disponible</h2>
        {{MENU_FEEDBACK}}
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {{MENU_CARDS}}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
