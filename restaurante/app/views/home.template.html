<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Menú - Restaurante</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/home.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-5" href="/">🍽️ Nuestro Restaurante</a>
            <div class="d-flex gap-2 align-items-center">
                {{NAV_ACTIONS}}
            </div>
        </div>
    </nav>

    <div class="bg-dark text-white py-4">
        <div class="container">
            <h1 class="fw-bold mb-1 fs-3">Bienvenido a Nuestro Restaurante</h1>
            <p class="mb-0 text-secondary">Explorá nuestro menú y encontrá tus platos favoritos</p>
        </div>
    </div>

    <div class="container py-4">
        <h4 class="mb-3 fw-semibold border-bottom pb-2">
            <i class="bi bi-list-ul me-2 text-primary"></i>Menú del Día
        </h4>
        {{UPLOAD_ERROR}}
        <div class="row g-4">
            {{MENU_CARDS}}
        </div>
    </div>

    <footer class="bg-dark text-secondary text-center py-3 mt-4">
        <small>&copy; 2026 Nuestro Restaurante &mdash; Todos los derechos reservados.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
